<!DOCTYPE html>
<html lang="en" data-theme="pink" data-dark="false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pastel Diary</title>
  <meta name="description" content="A beautiful personal diary with mood tracking, themes, tags, PIN lock, and more." />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- PIN Screen -->
  <div class="pin-screen" id="pinScreen" style="display:none">
    <div class="pin-card">
      <div class="pin-icon">🔒</div>
      <h2 class="pin-title">Welcome back</h2>
      <p class="pin-sub" id="pinDiaryName">My Diary</p>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <p class="pin-error" id="pinError"></p>
      <div class="pin-pad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-key--clear" data-key="clear">✕</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-key--back" data-key="back">⌫</button>
      </div>
    </div>
  </div>

  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-card">
      <div class="setup-petal" aria-hidden="true">🌸</div>
      <h1 class="setup-title">Hello, dear one.</h1>
      <p class="setup-sub">What shall we call this diary?</p>
      <input type="text" id="diaryNameInput" class="setup-input" placeholder="e.g. Aria's Diary, My Little World…" maxlength="40" autocomplete="off" />

      <p class="setup-sub" style="margin-top:1.5rem">Choose a theme</p>
      <div class="theme-swatches" id="setupThemePicker">
        <button class="theme-swatch active" data-theme="pink"     title="Pink"     style="--sw:hsl(340,70%,75%)"></button>
        <button class="theme-swatch"        data-theme="lavender" title="Lavender" style="--sw:hsl(270,55%,72%)"></button>
        <button class="theme-swatch"        data-theme="mint"     title="Mint"     style="--sw:hsl(150,50%,68%)"></button>
        <button class="theme-swatch"        data-theme="peach"    title="Peach"    style="--sw:hsl(25,75%,72%)"></button>
        <button class="theme-swatch"        data-theme="sky"      title="Sky"      style="--sw:hsl(200,65%,68%)"></button>
      </div>

      <p class="setup-sub" style="margin-top:1.5rem">Set a PIN <small style="opacity:.6">(optional, 4 digits)</small></p>
      <input type="password" id="pinSetupInput" class="setup-input" placeholder="Leave blank to skip" maxlength="4" pattern="\d{4}" inputmode="numeric" autocomplete="off" />

      <button class="setup-btn" id="setupBtn">Begin ✨</button>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="app" style="display:none">
    <div class="bg-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="diary-name" id="diaryNameDisplay">My Diary</div>
        <div class="sidebar-icons">
          <button class="icon-btn" id="darkModeBtn" title="Toggle dark mode">🌙</button>
          <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
      </div>

      <div class="graph-section">
        <div class="section-label">Mood — last 7 days</div>
        <canvas id="moodCanvas" width="220" height="90"></canvas>
        <div class="mood-legend">
          <span>😞</span><span style="margin-left:auto">😄</span>
        </div>
      </div>

      <div class="tag-filter-wrap">
        <div class="section-label">Filter by tag</div>
        <div class="tag-filter-list" id="tagFilterList"><span class="tag-empty">No tags yet</span></div>
      </div>

      <div class="section-label" style="margin-top:1.2rem">Past entries</div>
      <div class="entry-list" id="entryList">
        <div class="empty-state">No entries yet.<br/>Write your first one →</div>
      </div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="exportBtn" title="Export all entries as text">Export 📄</button>
        <button class="footer-btn" id="newEntryBtn">+ New</button>
      </div>
    </aside>

    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>

    <main class="main-area">
      <div class="editor-wrap">
        <div class="date-bar">
          <span class="date-display" id="dateDisplay"></span>
          <button class="date-edit-btn" id="dateEditBtn" title="Change date">✏️</button>
          <input type="date" id="dateInput" class="date-input" style="display:none" />
        </div>

        <div class="mood-row">
          <span class="mood-label">How are you feeling?</span>
          <div class="mood-picks" id="moodPicks">
            <button class="mood-btn" data-mood="1" title="Sad">😞</button>
            <button class="mood-btn" data-mood="2" title="Meh">😕</button>
            <button class="mood-btn" data-mood="3" title="Okay">😐</button>
            <button class="mood-btn" data-mood="4" title="Good">🙂</button>
            <button class="mood-btn" data-mood="5" title="Happy">😄</button>
          </div>
        </div>

        <input type="text" id="entryTitle" class="entry-title" placeholder="Give this entry a title…" maxlength="80" autocomplete="off" />

        <!-- Writing prompt -->
        <div class="prompt-bar">
          <button class="prompt-btn" id="promptBtn">💡 Get a writing prompt</button>
          <div class="prompt-bubble" id="promptBubble" style="display:none">
            <span id="promptText"></span>
            <button class="prompt-use" id="promptUse">Use this →</button>
            <button class="prompt-next" id="promptNext">↻</button>
          </div>
        </div>

        <textarea id="entryBody" class="entry-body" placeholder="Dear diary… write as much as you want. Your words are safe here."></textarea>

        <!-- Photo upload -->
        <div class="photo-section">
          <label class="photo-label" for="photoInput">📸 Add a photo</label>
          <input type="file" id="photoInput" accept="image/*" style="display:none" />
          <div class="photo-preview" id="photoPreview" style="display:none">
            <img id="photoImg" src="" alt="Entry photo" />
            <button class="photo-remove" id="photoRemove" title="Remove photo">✕</button>
          </div>
        </div>

        <!-- Tags -->
        <div class="tags-section">
          <div class="tags-display" id="tagsDisplay"></div>
          <input type="text" id="tagInput" class="tag-input" placeholder="Add a tag and press Enter…" maxlength="24" autocomplete="off" />
        </div>

        <div class="action-bar">
          <div class="char-count" id="charCount">0 words</div>
          <button class="save-btn" id="saveBtn">Save entry 💾</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display:none">
    <div class="modal-card">
      <h2 class="modal-title">Settings 🌷</h2>

      <label class="modal-label">Diary name</label>
      <input type="text" id="settingsDiaryName" class="setup-input" maxlength="40" />

      <label class="modal-label" style="margin-top:1rem">Theme</label>
      <div class="theme-swatches" id="settingsThemePicker">
        <button class="theme-swatch" data-theme="pink"     title="Pink"     style="--sw:hsl(340,70%,75%)"></button>
        <button class="theme-swatch" data-theme="lavender" title="Lavender" style="--sw:hsl(270,55%,72%)"></button>
        <button class="theme-swatch" data-theme="mint"     title="Mint"     style="--sw:hsl(150,50%,68%)"></button>
        <button class="theme-swatch" data-theme="peach"    title="Peach"    style="--sw:hsl(25,75%,72%)"></button>
        <button class="theme-swatch" data-theme="sky"      title="Sky"      style="--sw:hsl(200,65%,68%)"></button>
      </div>

      <label class="modal-label" style="margin-top:1rem">Dark mode</label>
      <button class="toggle-btn" id="darkModeToggle">🌙 Off</button>

      <label class="modal-label" style="margin-top:1rem">PIN lock <small style="opacity:.6">(4 digits, blank to remove)</small></label>
      <input type="password" id="settingsPin" class="setup-input" maxlength="4" pattern="\d{4}" inputmode="numeric" placeholder="Enter new PIN or leave blank" />

      <label class="modal-label" style="margin-top:1rem">Daily reminder</label>
      <div class="reminder-row">
        <input type="time" id="reminderTime" class="setup-input reminder-input" />
        <button class="footer-btn" id="reminderBtn">Set 🔔</button>
        <button class="footer-btn" id="reminderClear">Clear</button>
      </div>

      <div class="modal-btns">
        <button class="footer-btn" id="settingsCancel">Cancel</button>
        <button class="save-btn"   id="settingsSave">Save changes</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
